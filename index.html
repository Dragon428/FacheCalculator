<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#FFFFFF;--off:#FAFAF8;--line:#ECEAE6;--line2:#D8D4CE;
  --txt:#18160F;--muted:#9B9590;--hint:#C8C3BD;
  --coral:#C85230;--coral-d:#A8401F;--coral-l:#FBF0EC;
  --sand:#F5F2EE;--sand2:#EDE9E3;
}
body{min-height:100vh;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Jost','Helvetica Neue',sans-serif;padding:2.5rem 1.25rem;color:var(--txt);}
.top-left-logo{position:fixed;top:18px;left:22px;z-index:100;display:flex;align-items:center;gap:10px;}
.top-left-logo img{width:36px;height:36px;object-fit:contain;}
.top-left-logo .tl-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.15rem;font-weight:300;letter-spacing:-0.01em;color:var(--txt);line-height:1;}
.top-left-logo .tl-name em{font-style:italic;color:var(--coral);font-weight:400;}

/* SEO h1 hidden visually but readable by crawlers */
h1.seo{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}

/* Lang */
.lang-row{width:100%;max-width:380px;display:flex;justify-content:flex-end;margin-bottom:1.4rem;animation:rise .4s ease both;}
.lang-pill{display:flex;background:var(--sand);border:1px solid var(--line2);border-radius:100px;padding:3px;gap:2px;}
.lbtn{padding:5px 16px;font-size:0.7rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;background:transparent;border:none;border-radius:100px;cursor:pointer;color:var(--muted);transition:background .18s,color .18s,box-shadow .18s;font-family:'Jost',sans-serif;}
.lbtn.active{background:var(--white);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,0.10);}

/* Header */
.hdr{width:100%;max-width:380px;margin-bottom:1.8rem;animation:rise .45s ease .06s both;}
.rule{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.rule-line{flex:1;height:1px;background:var(--line);}
.rule-txt{font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--hint);white-space:nowrap;font-family:'Jost',sans-serif;}

.brand{display:flex;align-items:center;gap:14px;}
.brand-logo{width:48px;height:48px;flex-shrink:0;}
.brand-logo img{width:100%;height:100%;object-fit:contain;}
.brand-text{}
.brand-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:2.7rem;font-weight:300;letter-spacing:-0.02em;line-height:1;color:var(--txt);}
.brand-title em{font-style:italic;color:var(--coral);font-weight:400;}
.sub{margin-top:6px;font-size:0.82rem;color:var(--muted);font-weight:300;letter-spacing:0.03em;}

/* Card */
.card{width:100%;max-width:380px;background:var(--white);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 0 0 1px rgba(0,0,0,0.02),0 2px 4px rgba(0,0,0,0.04),0 12px 40px rgba(0,0,0,0.07);animation:rise .45s ease .12s both;}

/* Display */
.disp{background:var(--off);padding:1.75rem 1.75rem 1.25rem;border-bottom:1px solid var(--line);min-height:128px;display:flex;flex-direction:column;justify-content:flex-end;gap:4px;position:relative;overflow:hidden;}
.disp::before{content:'';position:absolute;right:-52px;top:-52px;width:160px;height:160px;border-radius:50%;border:1.5px solid var(--line);opacity:.55;pointer-events:none;}
.disp::after{content:'';position:absolute;right:-18px;top:-18px;width:72px;height:72px;border-radius:50%;border:1.5px solid var(--line2);opacity:.5;pointer-events:none;}
/* mini logo watermark in display */
.disp-logo{position:absolute;left:1.5rem;top:1.2rem;width:22px;height:22px;opacity:0.12;}
.disp-logo img{width:100%;height:100%;object-fit:contain;}

.expr{font-family:'Jost',sans-serif;font-size:0.78rem;color:var(--hint);text-align:right;min-height:20px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:300;letter-spacing:.02em;}
.main{font-family:'Cormorant Garamond',Georgia,serif;font-size:4rem;font-weight:300;color:var(--txt);text-align:right;letter-spacing:-0.03em;line-height:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:font-size .12s ease;}
.main.md{font-size:2.8rem;}.main.sm{font-size:2rem;}

/* Keys */
.keys{display:grid;grid-template-columns:repeat(4,1fr);gap:0;}
.keys button{appearance:none;border:none;outline:none;cursor:pointer;font-family:'Jost',sans-serif;height:76px;font-size:1.05rem;font-weight:400;display:flex;align-items:center;justify-content:center;transition:background .12s,transform .07s;user-select:none;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;box-shadow:inset 1px 0 0 var(--line),inset 0 1px 0 var(--line);}
.keys button:nth-child(4n+1){box-shadow:inset 0 1px 0 var(--line);}
.keys button:active{transform:scale(0.92);}
.d{background:var(--white);color:var(--txt);}.d:hover{background:var(--sand);}
.u{background:var(--sand);color:var(--txt);font-size:.85rem;font-weight:500;letter-spacing:0.04em;}.u:hover{background:var(--sand2);}
.o{background:var(--sand);color:var(--coral);font-size:1.25rem;font-weight:300;}.o:hover{background:var(--coral-l);}.o.lit{background:var(--coral);color:#fff;}.o.lit:hover{background:var(--coral-d);}
.eq{background:var(--coral);color:#fff;font-size:1.3rem;font-weight:300;}.eq:hover{background:var(--coral-d);}
.z{grid-column:span 2;justify-content:flex-start;padding-left:30px;}
.fl{position:absolute;inset:0;background:transparent;transition:background .16s;pointer-events:none;}
.keys button:active .fl{background:rgba(0,0,0,0.04);}

/* Footer */
.foot{display:flex;align-items:center;justify-content:space-between;padding:11px 1.75rem;border-top:1px solid var(--line);background:var(--off);}
.foot-brand{display:flex;align-items:center;gap:7px;}
.foot-logo{width:16px;height:16px;opacity:0.35;}
.foot-logo img{width:100%;height:100%;object-fit:contain;}
.foot-l{font-size:0.63rem;color:var(--hint);letter-spacing:.1em;text-transform:uppercase;font-family:'Jost',sans-serif;}
.dots{display:flex;gap:5px;align-items:center;}
.dot{width:5px;height:5px;border-radius:50%;}
.dot-a{background:var(--coral);opacity:.75;}.dot-b{background:var(--line2);}

/* Below */
.below{width:100%;max-width:380px;margin-top:1.75rem;display:flex;align-items:center;gap:12px;animation:rise .45s ease .2s both;}
.bl{flex:1;height:1px;background:var(--line);}
.bt{font-size:0.63rem;color:var(--hint);letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;font-family:'Jost',sans-serif;}

@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>

<script>
const T={
  en:{eyebrow:'—',sub:'Made By: Fache Studios',ac:'AC',strip:'FACHE CALCULATOR',below:'—'},
  es:{eyebrow:'—',sub:'Hecho por: Fache Studios',ac:'AC',strip:'FACHE CALCULATOR',below:'—'}
};
let lang='en';
function setLang(l){
  lang=l;const t=T[l];
  document.getElementById('T_sub').textContent=t.sub;
  document.getElementById('T_ac').textContent=t.ac;
  document.getElementById('T_strip').textContent=t.strip;
  document.getElementById('lEN').classList.toggle('active',l==='en');
  document.getElementById('lES').classList.toggle('active',l==='es');
  document.documentElement.lang=l;
}

let cur='0',hist='',op=null,mem=null,fresh=false;
const nEl=document.getElementById('main'),hEl=document.getElementById('expr');
function fmt(n){if(!isFinite(n))return n>0?'∞':'−∞';if(isNaN(n))return 'Error';return parseFloat(n.toPrecision(12)).toString();}
function render(){const l=cur.length;nEl.classList.toggle('md',l>9&&l<=13);nEl.classList.toggle('sm',l>13);nEl.textContent=cur;hEl.textContent=hist;}
function clearOps(){document.querySelectorAll('.o').forEach(b=>b.classList.remove('lit'));}
function digit(v){if(fresh){cur=v;fresh=false;}else cur=cur==='0'?v:cur+v;render();}
function dot(){if(fresh){cur='0.';fresh=false;}else if(!cur.includes('.'))cur+='.';render();}
function pct(){cur=fmt(parseFloat(cur)/100);fresh=true;render();}
function sign(){if(cur==='0')return;cur=cur.startsWith('−')?cur.slice(1):'−'+cur;render();}
function operator(o){clearOps();const v=parseFloat(cur);if(mem!==null&&!fresh){const r=calc(mem,v,op);cur=fmt(r);mem=parseFloat(cur);}else{mem=v;}op=o;fresh=true;hist=mem+' '+o;document.querySelectorAll('.o').forEach(b=>{if(b.dataset.op===o)b.classList.add('lit');});render();}
function equals(){clearOps();if(!op||mem===null)return;const v=parseFloat(cur);hist=mem+' '+op+' '+v+' =';cur=fmt(calc(mem,v,op));mem=null;op=null;fresh=true;render();}
function clear(){clearOps();cur='0';hist='';op=null;mem=null;fresh=false;render();}
function calc(a,b,o){switch(o){case '+':return a+b;case '−':return a-b;case '×':return a*b;case '÷':return b===0?NaN:a/b;}return b;}

document.getElementById('keys').addEventListener('pointerdown',e=>{
  const b=e.target.closest('button');if(!b)return;
  const{a,v,op:o}=b.dataset;
  switch(a){case 'd':digit(v);break;case 'dot':dot();break;case 'op':operator(o);break;case 'eq':equals();break;case 'clear':clear();break;case 'sign':sign();break;case 'pct':pct();break;}
});
const km={'0':'d:0','1':'d:1','2':'d:2','3':'d:3','4':'d:4','5':'d:5','6':'d:6','7':'d:7','8':'d:8','9':'d:9','.':'dot',',':'dot','+':'op:+','-':'op:−','*':'op:×','/':'op:÷','Enter':'eq','=':'eq','Escape':'clear','Backspace':'clear','%':'pct'};
document.addEventListener('keydown',e=>{const m=km[e.key];if(!m)return;e.preventDefault();const[a,b]=m.split(':');switch(a){case 'd':digit(b);break;case 'dot':dot();break;case 'op':operator(b);break;case 'eq':equals();break;case 'clear':clear();break;case 'pct':pct();break;}});
render();
</script>
